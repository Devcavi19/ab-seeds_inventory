{% extends "base.html" %}

{% block title %}Edit User - AB Seeds Inventory{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        Edit User: {{ user['username'] }}
    </div>
    
    <form method="POST" action="{{ url_for('management.edit_user', user_id=user['id']) }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" value="{{ user['username'] }}" disabled>
        </div>
        
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" class="form-control" value="{{ user['full_name'] }}" required>
        </div>
        
        <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role" class="form-control" required>
                <option value="admin" {% if user['role'] == 'admin' %}selected{% endif %}>Admin</option>
                <option value="staff" {% if user['role'] == 'staff' %}selected{% endif %}>Staff</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_active" {% if user['is_active'] %}checked{% endif %}> 
                Active
            </label>
        </div>
        
        <button type="submit" class="btn btn-primary">Update User</button>
        <a href="{{ url_for('management.users') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
