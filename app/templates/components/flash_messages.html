{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="flash-messages">
            {% for category, message in messages %}
                <div class="flash-message flash-{{ category }}" role="status">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        {% if category == 'success' %}<path d="M20 6 9 17l-5-5"/>
                        {% elif category == 'error' %}<circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/>
                        {% elif category == 'warning' %}<path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4M12 17h.01"/>
                        {% else %}<circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/>{% endif %}
                    </svg>
                    <span>{{ message }}</span>
                </div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}
