{% extends "base.html" %}

{% block title %}Edit Category - AB Seeds Inventory{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        Edit Category: {{ category['name'] }}
    </div>
    
    <form method="POST" action="{{ url_for('categories.edit_category', category_id=category['id']) }}">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" class="form-control" value="{{ category['name'] }}" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control" rows="3" required>{{ category['description'] }}</textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">Update Category</button>
        <a href="{{ url_for('categories.list_categories') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
