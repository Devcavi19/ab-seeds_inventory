{% extends "base.html" %}

{% block title %}Edit Customer - AB Seeds Inventory{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        Edit Customer
    </div>
    
    <form method="POST" action="{{ url_for('customers.edit_customer', customer_id=customer['id']) }}">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" class="form-control" value="{{ customer['name'] }}" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" value="{{ customer['email'] }}" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="text" id="phone" name="phone" class="form-control" value="{{ customer['phone'] }}" required>
        </div>
        
        <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" class="form-control" rows="3" required>{{ customer['address'] }}</textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">Update Customer</button>
        <a href="{{ url_for('customers.list_customers') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
