{% extends "base.html" %}

{% block title %}Edit Sale{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Edit Sale #{{ sale.sale_number }}</h2>

    <form method="POST" action="{{ url_for('sales.edit_sale', sale_id=sale.id) }}">
        <div class="card mb-4">
            <div class="card-header">
                <h5>Sale Information</h5>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="sale_number" class="form-label">Sale Number</label>
                        <input type="text" class="form-control" id="sale_number" name="sale_number" value="{{ sale.sale_number }}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="customer_id" class="form-label">Customer</label>
                        <select class="form-select" id="customer_id" name="customer_id">
                            <option value="">Walk-in / Unregistered</option>
                            {% for customer in customers %}
                            <option value="{{ customer.id }}" {% if customer.id == sale.customer_id %}selected{% endif %}>{{ customer.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" id="status" name="status" required>
                            <option value="pending" {% if sale.status == 'pending' %}selected{% endif %}>Pending</option>
                            <option value="completed" {% if sale.status == 'completed' %}selected{% endif %}>Completed</option>
                            <option value="cancelled" {% if sale.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="sale_date" class="form-label">Sale Date</label>
                        <input type="date" class="form-control" id="sale_date" name="sale_date" value="{{ sale.sale_date }}" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="payment_method" class="form-label">Payment Method</label>
                        <input type="text" class="form-control" id="payment_method" name="payment_method" value="{{ sale.payment_method or '' }}" placeholder="e.g. cash, card">
                    </div>
                    <div class="col-md-6">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="2">{{ sale.notes or '' }}</textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5>Sale Items</h5>
                <button type="button" class="btn btn-sm btn-success" id="add-item-btn">
                    <i class="bi bi-plus"></i> Add Item
                </button>
            </div>
            <div class="card-body" id="items-container">
                {% if items %}
                    {% for item in items %}
                    <div class="item-row row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Product</label>
                            <select class="form-select product-select" name="item_product_id[]" required>
                                <option value="">Select Product</option>
                                {% for product in products %}
                                <option value="{{ product.id }}" {% if product.id == item.product_id %}selected{% endif %}>{{ product.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Quantity</label>
                            <input type="number" class="form-control" name="item_quantity[]" min="1" value="{{ item.quantity }}" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Unit Price</label>
                            <input type="number" class="form-control" name="item_unit_price[]" step="0.01" min="0" value="{{ item.unit_price }}" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Total</label>
                            <input type="text" class="form-control item-total" value="${{ "%.2f"|format(item.quantity * item.unit_price) }}" readonly>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" class="btn btn-danger remove-item-btn w-100">
                                <i class="bi bi-trash"></i> Remove
                            </button>
                        </div>
                    </div>
                    {% endfor %}
                {% else %}
                    <div class="item-row row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Product</label>
                            <select class="form-select product-select" name="item_product_id[]" required>
                                <option value="">Select Product</option>
                                {% for product in products %}
                                <option value="{{ product.id }}">{{ product.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Quantity</label>
                            <input type="number" class="form-control" name="item_quantity[]" min="1" value="1" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Unit Price</label>
                            <input type="number" class="form-control" name="item_unit_price[]" step="0.01" min="0" value="0.00" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Total</label>
                            <input type="text" class="form-control item-total" value="$0.00" readonly>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" class="btn btn-danger remove-item-btn w-100">
                                <i class="bi bi-trash"></i> Remove
                            </button>
                        </div>
                    </div>
                {% endif %}
            </div>
        </div>

        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Update Sale
            </button>
            <a href="{{ url_for('sales.list_sales') }}" class="btn btn-secondary">
                <i class="bi bi-x"></i> Cancel
            </a>
        </div>
    </form>
</div>

<script>
// JavaScript for dynamic items
document.addEventListener('DOMContentLoaded', function() {
    const itemsContainer = document.getElementById('items-container');
    const addItemBtn = document.getElementById('add-item-btn');

    // Add new item row
    addItemBtn.addEventListener('click', function() {
        const newRow = document.querySelector('.item-row').cloneNode(true);

        // Clear values
        newRow.querySelector('.product-select').value = '';
        newRow.querySelector('input[name="item_quantity[]"]').value = '1';
        newRow.querySelector('input[name="item_unit_price[]"]').value = '0.00';
        newRow.querySelector('.item-total').value = '$0.00';

        itemsContainer.appendChild(newRow);
    });

    // Remove item row
    itemsContainer.addEventListener('click', function(e) {
        if (e.target.closest('.remove-item-btn')) {
            if (document.querySelectorAll('.item-row').length > 1) {
                e.target.closest('.item-row').remove();
            } else {
                alert('At least one item is required.');
            }
        }
    });

    // Calculate item total
    itemsContainer.addEventListener('input', function(e) {
        if (e.target.name === 'item_quantity[]' || e.target.name === 'item_unit_price[]') {
            const row = e.target.closest('.item-row');
            const quantity = parseFloat(row.querySelector('input[name="item_quantity[]"]').value) || 0;
            const unitPrice = parseFloat(row.querySelector('input[name="item_unit_price[]"]').value) || 0;
            const total = quantity * unitPrice;
            row.querySelector('.item-total').value = '$' + total.toFixed(2);
        }
    });
});
</script>
{% endblock %}
