{% extends "base.html" %}

{% block title %}Create Product - AB Seeds Inventory{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        Create New Product
    </div>
    
    <form method="POST" action="{{ url_for('products.create_product') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control" rows="3" required></textarea>
        </div>
        
        <div class="form-group">
            <label for="price">Price</label>
            <input type="number" step="0.01" id="price" name="price" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="stock_quantity">Stock Quantity</label>
            <input type="number" id="stock_quantity" name="stock_quantity" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="category_id">Category</label>
            <select id="category_id" name="category_id" class="form-control" required>
                <option value="">Select a category</option>
                {% for category in categories %}
                <option value="{{ category['id'] }}">{{ category['name'] }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="image">Product Image</label>
            <input type="file" id="image" name="image" class="form-control-file" accept=".png,.jpg,.jpeg,.gif">
        </div>
        
        <button type="submit" class="btn btn-primary">Create Product</button>
        <a href="{{ url_for('products.list_products') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
