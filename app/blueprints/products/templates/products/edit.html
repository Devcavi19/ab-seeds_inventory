{% extends "base.html" %}

{% block title %}Edit Product - AB Seeds Inventory{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        Edit Product: {{ product['name'] }}
    </div>
    
    <form method="POST" action="{{ url_for('products.edit_product', product_id=product['id']) }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" class="form-control" value="{{ product['name'] }}" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control" rows="3" required>{{ product['description'] }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="price">Price</label>
            <input type="number" step="0.01" id="price" name="price" class="form-control" value="{{ product['price'] }}" required>
        </div>
        
        <div class="form-group">
            <label for="stock_quantity">Stock Quantity</label>
            <input type="number" id="stock_quantity" name="stock_quantity" class="form-control" value="{{ product['stock_quantity'] }}" required>
        </div>
        
        <div class="form-group">
            <label for="category_id">Category</label>
            <select id="category_id" name="category_id" class="form-control" required>
                <option value="">Select a category</option>
                {% for category in categories %}
                <option value="{{ category['id'] }}" {% if product['category_id'] == category['id'] %}selected{% endif %}>{{ category['name'] }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="image">Product Image</label>
            <input type="file" id="image" name="image" class="form-control-file" accept=".png,.jpg,.jpeg,.gif">
            {% if product['image_path'] %}
            <small class="form-text text-muted">Current image: {{ product['image_path'] }}</small>
            {% endif %}
        </div>
        
        <button type="submit" class="btn btn-primary">Update Product</button>
        <a href="{{ url_for('products.list_products') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
