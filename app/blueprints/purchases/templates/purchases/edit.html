{% extends "base.html" %}

{% block title %}Edit Purchase Order{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Edit Purchase Order #{{ order.order_number }}</h2>
    
    <form method="POST" action="{{ url_for('purchases.edit_purchase_order', order_id=order.id) }}">
        <div class="card mb-4">
            <div class="card-header">
                <h5>Order Information</h5>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="order_number" class="form-label">Order Number</label>
                        <input type="text" class="form-control" id="order_number" name="order_number" value="{{ order.order_number }}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="supplier_id" class="form-label">Supplier</label>
                        <select class="form-select" id="supplier_id" name="supplier_id" required>
                            <option value="">Select Supplier</option>
                            {% for supplier in suppliers %}
                            <option value="{{ supplier.id }}" {% if supplier.id == order.supplier_id %}selected{% endif %}>{{ supplier.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" id="status" name="status" required>
                            <option value="pending" {% if order.status == 'pending' %}selected{% endif %}>Pending</option>
                            <option value="completed" {% if order.status == 'completed' %}selected{% endif %}>Completed</option>
                            <option value="cancelled" {% if order.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="order_date" class="form-label">Order Date</label>
                        <input type="date" class="form-control" id="order_date" name="order_date" value="{{ order.order_date }}" required>
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="received_date" class="form-label">Received Date</label>
                        <input type="date" class="form-control" id="received_date" name="received_date" value="{{ order.received_date or '' }}">
                    </div>
                    <div class="col-md-6">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="2">{{ order.notes or '' }}</textarea>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5>Order Items</h5>
                <button type="button" class="btn btn-sm btn-success" id="add-item-btn">
                    <i class="bi bi-plus"></i> Add Item
                </button>
            </div>
            <div class="card-body" id="items-container">
                {% if items %}
                    {% for item in items %}
                    <div class="item-row row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Product</label>
                            <select class="form-select product-select" name="item_product_id[]" required>
                                <option value="">Select Product</option>
                                {% for product in products %}
                                <option value="{{ product.id }}" {% if product.id == item.product_id %}selected{% endif %}>{{ product.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Quantity</label>
                            <input type="number" class="form-control" name="item_quantity[]" min="1" value="{{ item.quantity }}" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Unit Cost</label>
                            <input type="number" class="form-control" name="item_unit_cost[]" step="0.01" min="0" value="{{ item.unit_cost }}" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Total</label>
                            <input type="text" class="form-control item-total" value="₱{{ "%.2f"|format(item.quantity * item.unit_cost) }}" readonly>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" class="btn btn-danger remove-item-btn w-100">
                                <i class="bi bi-trash"></i> Remove
                            </button>
                        </div>
                    </div>
                    {% endfor %}
                {% else %}
                    <div class="item-row row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Product</label>
                            <select class="form-select product-select" name="item_product_id[]" required>
                                <option value="">Select Product</option>
                                {% for product in products %}
                                <option value="{{ product.id }}">{{ product.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Quantity</label>
                            <input type="number" class="form-control" name="item_quantity[]" min="1" value="1" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Unit Cost</label>
                            <input type="number" class="form-control" name="item_unit_cost[]" step="0.01" min="0" value="0.00" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Total</label>
                            <input type="text" class="form-control item-total" value="₱0.00" readonly>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" class="btn btn-danger remove-item-btn w-100">
                                <i class="bi bi-trash"></i> Remove
                            </button>
                        </div>
                    </div>
                {% endif %}
            </div>
        </div>
        
        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Update Purchase Order
            </button>
            <a href="{{ url_for('purchases.list_purchase_orders') }}" class="btn btn-secondary">
                <i class="bi bi-x"></i> Cancel
            </a>
        </div>
    </form>
</div>

<script>
// JavaScript for dynamic items
document.addEventListener('DOMContentLoaded', function() {
    const itemsContainer = document.getElementById('items-container');
    const addItemBtn = document.getElementById('add-item-btn');
    
    // Add new item row
    addItemBtn.addEventListener('click', function() {
        const newRow = document.querySelector('.item-row').cloneNode(true);
        
        // Clear values
        newRow.querySelector('.product-select').value = '';
        newRow.querySelector('input[name="item_quantity[]"]').value = '1';
        newRow.querySelector('input[name="item_unit_cost[]"]').value = '0.00';
        newRow.querySelector('.item-total').value = '₱0.00';
        
        itemsContainer.appendChild(newRow);
    });
    
    // Remove item row
    itemsContainer.addEventListener('click', function(e) {
        if (e.target.closest('.remove-item-btn')) {
            if (document.querySelectorAll('.item-row').length > 1) {
                e.target.closest('.item-row').remove();
            } else {
                alert('At least one item is required.');
            }
        }
    });
    
    // Calculate item total
    itemsContainer.addEventListener('input', function(e) {
        if (e.target.name === 'item_quantity[]' || e.target.name === 'item_unit_cost[]') {
            const row = e.target.closest('.item-row');
            const quantity = parseFloat(row.querySelector('input[name="item_quantity[]"]').value) || 0;
            const unitCost = parseFloat(row.querySelector('input[name="item_unit_cost[]"]').value) || 0;
            const total = quantity * unitCost;
            row.querySelector('.item-total').value = '₱' + total.toFixed(2);
        }
    });
});
</script>
{% endblock %}
